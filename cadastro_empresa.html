<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Cadastrar Empresa - Avaliação de Maturidade da TI</title>

</head>
<body onload="verificarLogin(); verificarPermissao('cadastro_empresa.html')">

        <h1>Cadastrar Empresa</h1>
        <nav>

        <form id="formEmpresa">
            <label for="nomeEmpresa">Nome da Empresa:</label>
            <input type="text" id="nomeEmpresa" required>

            <label for="setor">Setor:</label>

            <button type="button" onclick="cadastrarEmpresa()">Cadastrar</button>
        </form>
    </main>
