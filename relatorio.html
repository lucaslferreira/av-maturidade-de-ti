<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório - Avaliação de Maturidade da TI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="verificarLogin(); inicializarRelatorio()">
    <header>
        <h1>Relatório de Maturidade da TI</h1>
        <nav>
            <a href="index.html">Voltar</a>
        </nav>
    </header>
    <main>
        <section id="selecaoRelatorio" style="display: none;">
            <h2>Selecionar Relatório</h2>
            <select id="relatorioSelect">
                <option value="">Selecione um relatório...</option>
            </select>
            <button onclick="carregarRelatorioSelecionado()">Visualizar Relatório</button>
        </section>
        <section id="relatorioContent" style="display: none;">
            <h2 id="empresaRelatorio"></h2>
            <h2>Score Total: <span id="scoreTotal"></span></h2>
            <h2>Nível de Maturidade: <span id="nivelMaturidade"></span></h2>
            <div id="detalhes"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 - Sistema de Avaliação de Maturidade da TI</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
